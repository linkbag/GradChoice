AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: GradChoice API — FastAPI on Lambda + API Gateway

Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64
    Environment:
      Variables:
        DATABASE_URL: !Ref DatabaseUrl
        SECRET_KEY: !Ref SecretKey
        ALLOWED_ORIGINS: !Ref AllowedOrigins

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
  SecretKey:
    Type: String
    NoEcho: true
  AllowedOrigins:
    Type: String
    Default: "https://gradchoice.org,https://www.gradchoice.org"

Resources:
  GradChoiceApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - "https://gradchoice.org"
          - "https://www.gradchoice.org"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 3600

  GradChoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.handler
      CodeUri: .
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref GradChoiceApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref GradChoiceApi
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${GradChoiceApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt GradChoiceFunction.Arn

name: Deploy Database to Neon

on:
  workflow_dispatch:
    inputs:
      seed_data:
        description: 'Also seed supervisor/review data (first-time setup)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      fresh_seed:
        description: 'Drop all tables first (DESTRUCTIVE — use for fresh re-seed only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  migrate-and-seed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        if: ${{ inputs.seed_data == 'true' || inputs.fresh_seed == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Drop all tables (fresh start)
        if: ${{ inputs.fresh_seed == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          psql "${DATABASE_URL}" -c "
            DO \$\$ DECLARE r RECORD;
            BEGIN
              FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                EXECUTE 'DROP TABLE IF EXISTS public.' || quote_ident(r.tablename) || ' CASCADE';
              END LOOP;
            END \$\$;
          "
          echo "✅ All tables dropped"

      - name: Run Alembic migrations
        working-directory: backend
        env:
          SECRET_KEY: "ci-migration-only-not-used-for-auth"
        run: |
          # Neon may not set search_path to public by default
          # Append options to ensure public schema is used
          BASE_URL="${{ secrets.DATABASE_URL }}"
          if [[ "$BASE_URL" == *"?"* ]]; then
            export DATABASE_URL="${BASE_URL}&options=-csearch_path%3Dpublic"
          else
            export DATABASE_URL="${BASE_URL}?options=-csearch_path%3Dpublic"
          fi
          alembic upgrade head

      - name: Seed data
        if: ${{ inputs.seed_data == 'true' || inputs.fresh_seed == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Seeding database from dump..."
          gunzip -c data/seed_dump.sql.gz \
            | grep -v 'DISABLE TRIGGER' \
            | grep -v 'ENABLE TRIGGER' \
            | psql "${DATABASE_URL}" -v ON_ERROR_STOP=0 || true

          echo ""
          echo "Verifying seed..."
          psql "${DATABASE_URL}" -c "SELECT count(*) as supervisors FROM public.supervisors;"
          psql "${DATABASE_URL}" -c "SELECT count(*) as comments FROM public.comments;"
          psql "${DATABASE_URL}" -c "SELECT count(*) as ratings FROM public.ratings;"
          echo "✅ Seed complete"

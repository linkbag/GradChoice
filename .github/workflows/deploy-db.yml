name: Deploy Database to Neon

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: true
        default: 'migrate'
        type: choice
        options:
          - 'migrate'
          - 'full-seed'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Full seed (schema + data from dump)
        if: ${{ inputs.mode == 'full-seed' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Dropping existing objects..."
          psql "${DATABASE_URL}" -c "
            DO \$\$ DECLARE r RECORD;
            BEGIN
              FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP
                EXECUTE 'DROP TABLE IF EXISTS public.' || quote_ident(r.tablename) || ' CASCADE';
              END LOOP;
              FOR r IN (SELECT typname FROM pg_type t JOIN pg_namespace n ON t.typnamespace = n.oid WHERE n.nspname = 'public' AND t.typtype = 'e') LOOP
                EXECUTE 'DROP TYPE IF EXISTS public.' || quote_ident(r.typname) || ' CASCADE';
              END LOOP;
            END \$\$;
          "

          echo "Loading full dump (schema + data)..."
          gunzip -c data/seed_dump.sql.gz | psql "${DATABASE_URL}" --set ON_ERROR_STOP=off 2>&1 | tail -20

          echo ""
          echo "Verifying..."
          psql "${DATABASE_URL}" -c "SELECT 'supervisors' as tbl, count(*) as rows FROM public.supervisors UNION ALL SELECT 'comments', count(*) FROM public.comments UNION ALL SELECT 'ratings', count(*) FROM public.ratings;"
          echo "✅ Full seed complete"

      - name: Migrate only (Alembic)
        if: ${{ inputs.mode == 'migrate' }}
        run: |
          pip install -r backend/requirements.txt
          cd backend
          DATABASE_URL="${{ secrets.DATABASE_URL }}" SECRET_KEY="ci-only" alembic upgrade head
          echo "✅ Migrations complete"

name: Deploy GradChoice

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  LAMBDA_FUNCTION: gradchoice-api
  API_NAME: gradchoice-api

jobs:
  # ──────────────────────────────────────────────
  # Backend: FastAPI → AWS Lambda + API Gateway
  # ──────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build Lambda package
        working-directory: backend
        run: |
          mkdir -p package
          pip install -r requirements-lambda.txt -t package/ --platform manylinux2014_x86_64 --python-version 3.12 --only-binary=:all:
          cp -r app package/
          cp lambda_handler.py package/
          # Strip unnecessary files to keep under 50MB zip limit
          # NOTE: keep .dist-info — email-validator and pydantic require package metadata at runtime
          find package -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find package -name "tests" -type d -exec rm -rf {} + 2>/dev/null || true
          cd package && zip -r9 ../lambda.zip . -x "*.pyc"
          cd .. && echo "Package size: $(du -sh lambda.zip | cut -f1)"

      - name: Create or update Lambda function
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          ROLE_NAME="${LAMBDA_FUNCTION}-role"

          # Check if function exists
          if aws lambda get-function --function-name $LAMBDA_FUNCTION 2>/dev/null; then
            echo "Updating existing Lambda function..."
            aws lambda update-function-code \
              --function-name $LAMBDA_FUNCTION \
              --zip-file fileb://lambda.zip

            # Wait for update to complete
            aws lambda wait function-updated --function-name $LAMBDA_FUNCTION

            aws lambda update-function-configuration \
              --function-name $LAMBDA_FUNCTION \
              --timeout 30 \
              --memory-size 512 \
              --environment "Variables={DATABASE_URL=${DATABASE_URL},SECRET_KEY=${SECRET_KEY},ALLOWED_ORIGINS=https://gradchoice.org\\,https://www.gradchoice.org}"
          else
            echo "Creating Lambda execution role..."
            TRUST_POLICY='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'

            ROLE_ARN=$(aws iam create-role \
              --role-name $ROLE_NAME \
              --assume-role-policy-document "$TRUST_POLICY" \
              --query 'Role.Arn' --output text 2>/dev/null || \
              aws iam get-role --role-name $ROLE_NAME --query 'Role.Arn' --output text)

            aws iam attach-role-policy \
              --role-name $ROLE_NAME \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true

            echo "Waiting for role propagation..."
            sleep 10

            echo "Creating Lambda function..."
            aws lambda create-function \
              --function-name $LAMBDA_FUNCTION \
              --runtime python3.12 \
              --handler lambda_handler.handler \
              --role "$ROLE_ARN" \
              --zip-file fileb://lambda.zip \
              --timeout 30 \
              --memory-size 512 \
              --environment "Variables={DATABASE_URL=${DATABASE_URL},SECRET_KEY=${SECRET_KEY},ALLOWED_ORIGINS=https://gradchoice.org\\,https://www.gradchoice.org}"
          fi

          aws lambda wait function-updated --function-name $LAMBDA_FUNCTION 2>/dev/null || true
          echo "✅ Lambda function deployed"

      - name: Create or get API Gateway
        id: api-gw
        env:
          AWS_REGION_VAL: ${{ secrets.AWS_REGION }}
        run: |
          # Check if API already exists
          API_ID=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='${API_NAME}'].ApiId" \
            --output text)

          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            echo "Creating HTTP API Gateway..."
            API_ID=$(aws apigatewayv2 create-api \
              --name $API_NAME \
              --protocol-type HTTP \
              --cors-configuration '{
                "AllowOrigins":["https://gradchoice.org","https://www.gradchoice.org"],
                "AllowMethods":["GET","POST","PUT","DELETE","OPTIONS"],
                "AllowHeaders":["Content-Type","Authorization"],
                "MaxAge":3600
              }' \
              --query 'ApiId' --output text)

            echo "Setting up Lambda integration..."
            LAMBDA_ARN=$(aws lambda get-function \
              --function-name $LAMBDA_FUNCTION \
              --query 'Configuration.FunctionArn' --output text)

            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id $API_ID \
              --integration-type AWS_PROXY \
              --integration-uri "$LAMBDA_ARN" \
              --payload-format-version "2.0" \
              --query 'IntegrationId' --output text)

            aws apigatewayv2 create-route \
              --api-id $API_ID \
              --route-key 'ANY /{proxy+}' \
              --target "integrations/${INTEGRATION_ID}"

            aws apigatewayv2 create-route \
              --api-id $API_ID \
              --route-key 'ANY /' \
              --target "integrations/${INTEGRATION_ID}"

            aws apigatewayv2 create-stage \
              --api-id $API_ID \
              --stage-name prod \
              --auto-deploy

            # Grant API Gateway permission to invoke Lambda
            ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
            REGION=${{ secrets.AWS_REGION }}
            aws lambda add-permission \
              --function-name $LAMBDA_FUNCTION \
              --statement-id apigateway-invoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:${REGION}:${ACCOUNT_ID}:${API_ID}/*" 2>/dev/null || true
          fi

          API_URL="https://${API_ID}.execute-api.${AWS_REGION_VAL}.amazonaws.com/prod"
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT
          echo "API URL: ${API_URL}"

    outputs:
      api_url: ${{ steps.api-gw.outputs.api_url }}

  # ──────────────────────────────────────────────
  # Frontend: React → Cloudflare Pages
  # ──────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
        run: npm run build

      - name: Create Cloudflare Pages project (if needed)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages project create gradchoice --production-branch=main 2>/dev/null || echo "Project already exists"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=gradchoice --commit-dirty=true
